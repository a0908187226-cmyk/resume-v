<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>個人履歷 - 楊承諺</title>

<style>
body{
    font-family: Arial, "Microsoft JhengHei";
    margin:0;
    background:#f5f5f5;
}

header{
    background:#2c3e50;
    color:white;
    padding:30px;
    text-align:center;
}

.container{
    width:80%;
    margin:auto;
    background:white;
    padding:30px;
}

h2{
    border-bottom:2px solid #2c3e50;
    padding-bottom:5px;
}

.section{
    margin-bottom:25px;
}

.info{
    line-height:1.8;
}

.skill-bar{
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
}

.skill-fill{
    height:20px;
    background:#3498db;
    width:0%;
}

button{
    padding:10px 15px;
    border:none;
    background:#3498db;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#2980b9;
}

footer{
    text-align:center;
    margin-top:20px;
    color:#666;
}
</style>
</head>

<body>

<header>
<h1>楊承諺</h1>
<p>亞洲大學學生 | 對人工智慧與程式設計有興趣</p>
</header>

<div class="container">

<div class="section">
<h2>基本資料</h2>
<div class="info">
學校：亞洲大學<br>
學號：AU114022027<br>
科系：人工智慧相關領域（申請目標）<br>
Email：example@email.com
</div>
</div>

<div class="section">
<h2>自我介紹</h2>
<p>
我是亞洲大學的學生，對人工智慧與程式設計有興趣。
曾參加創意機器人社團，也修過進階程式設計課程，
希望未來能在人工智慧領域持續學習與發展。
</p>
</div>

<div class="section">
<h2>技能</h2>

Python
<div class="skill-bar">
<div class="skill-fill" data-skill="80"></div>
</div>

程式設計
<div class="skill-bar">
<div class="skill-fill" data-skill="75"></div>
</div>

AI基礎
<div class="skill-bar">
<div class="skill-fill" data-skill="65"></div>
</div>

</div>

<div class="section">
<h2>經歷</h2>
<ul>
<li>創意機器人社團成員</li>
<li>修習進階程式設計課程</li>
<li>參與科技相關參訪活動</li>
</ul>
</div>

<button onclick="showTime()">顯示目前時間</button>
<p id="time"></p>

<footer>
<p>© 2026 個人履歷</p>
</footer>

</div>

<script>

function showTime(){
    const now = new Date();
    document.getElementById("time").innerText =
    "現在時間：" + now.toLocaleString();
}

window.onload=function(){
    const skills=document.querySelectorAll(".skill-fill");
    skills.forEach(skill=>{
        const level=skill.getAttribute("data-skill");
        skill.style.width=level+"%";
    });
}

</script>

</body>
</html>
